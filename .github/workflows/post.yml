name: Unwetterwarnungen auf X posten

on:
  schedule:
    # Alle 5 Minuten — GitHub-Action-Cron kann 5–10 Min Verzug haben, das ist OK.
    # Cooldown-Logik in post.js entscheidet, ob ein konkreter Run posten darf.
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      env:
        description: 'API-Umgebung'
        required: true
        default: 'prod'
        type: choice
        options: [prod, stage]
      dry_run:
        description: 'Dry-Run (keine Tweets, nur Logs + Screenshot-Artefakt)'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

permissions:
  contents: write          # damit der state-Commit zurückgeschoben werden kann

concurrency:
  group: x-poster
  cancel-in-progress: false # laufende Runs zu Ende laufen lassen — sonst State-Konflikt

# upload-artifact@v5 deklariert intern noch Node 20 — mit diesem Flag zwingt der
# Runner Node 24, wie von der Deprecation-Warning empfohlen. Sobald upload-artifact
# einen Tag mit korrekt deklariertem Node 24 ausliefert, kann das wieder weg.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm install
        run: npm install

      - name: Playwright Chromium installieren
        run: npx playwright install --with-deps chromium

      - name: Worker ausführen
        env:
          ENV:              ${{ github.event.inputs.env || 'prod' }}
          DRY_RUN:          ${{ github.event.inputs.dry_run || 'false' }}
          RENDER_BASE_URL:  https://tool.wetteralarm.ch/x-warnungen
          X_TOKENS_DE:      ${{ secrets.X_TOKENS_DE }}
          X_TOKENS_FR:      ${{ secrets.X_TOKENS_FR }}
          X_TOKENS_IT:      ${{ secrets.X_TOKENS_IT }}
        run: node post.js

      - name: State zurück-committen
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "wetteralarm-x-bot"
          git config user.email "bot@wetteralarm.ch"
          git add state/posted.json || true
          git diff --cached --quiet || git commit -m "chore: posted state update"
          git push || true

      - name: Screenshot(s) als Artefakt hochladen
        # if: always() — auch wenn vorherige Steps fehlschlugen (z.B. X-API-Error).
        # So sehen wir das Bild auch wenn das Tweet-Posting scheitert.
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: screenshot-${{ github.run_id }}
          path: |
            state/screenshot-*.jpg
            state/dry-run-*.jpg
          if-no-files-found: ignore
          retention-days: 14
